name: Build AAB (Play)

# Android App Bundle ASSINADO, o artefato que sobe pra Play Console.
# Disparo manual: aba Actions > Build AAB (Play) > Run workflow.
#
# BLOQUEADO ate os secrets existirem. Passo humano, nesta ordem:
#   1. gerar a keystore de upload (uma vez, e NUNCA perder — sem ela nao da pra
#      atualizar o app depois de publicado):
#        keytool -genkey -v -keystore ~/.android-keystores/quantocobro-upload.jks \
#          -keyalg RSA -keysize 2048 -validity 10000 -alias upload
#   2. Settings > Secrets and variables > Actions, criar:
#        KEYSTORE_BASE64  -> base64 -w0 ~/.android-keystores/quantocobro-upload.jks
#        STORE_PASSWORD   -> senha da keystore
#        KEY_PASSWORD     -> senha da chave
#        KEY_ALIAS        -> upload
#
# A keystore fica fora do git (.gitignore ja cobre *.jks e key.properties).
# Guarde backup dela fora desta maquina.
#
# Este app NAO tem MAPS_API_KEY nem dart-define de anuncio (sem AdMob, sem mapa)
# — ver docs/planning/11-HANDOFF.md §6. Se voce copiou este arquivo do repo do
# Deixei Aqui, e por isso que aqueles campos sumiram.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: conferir que os secrets existem
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 nao esta configurado. Sem keystore o AAB sairia assinado com a chave de debug e a Play recusaria. Ver o cabecalho deste arquivo."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: recriar keystore + key.properties
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=$RUNNER_TEMP/upload.jks
          EOF

      - run: flutter pub get

      - name: build appbundle
        run: flutter build appbundle --release

      - name: conferir que NAO saiu com a chave de debug
        run: |
          # A Play recusa "CN=Android Debug". Falhar aqui custa 2 min; descobrir
          # no upload custa uma rodada inteira.
          if keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab 2>/dev/null | grep -q "Android Debug"; then
            echo "::error::AAB assinado com a chave de DEBUG. A Play vai recusar."
            exit 1
          fi
          ls -lh build/app/outputs/bundle/release/app-release.aab

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
