<!-- escala o aparelho p/ caber na viewport (nunca aumenta além de 1) -->
<script>
(function () {
  function fit() {
    var dev = document.querySelector(".qc-device");
    var wrap = document.querySelector(".qc-phone-wrap");
    if (!dev || !wrap) return;
    var pad = 32;
    var s = Math.min(1, (wrap.clientHeight - pad) / 844, (wrap.clientWidth - pad) / 390);
    dev.style.zoom = s;
  }
  var tries = 0;
  var iv = setInterval(function () { fit(); if (++tries > 30) clearInterval(iv); }, 100);
  window.addEventListener("resize", fit);
})();
</script>
