# A maquina de desenvolvimento tem 11 GiB. O template do Flutter vem com
# -Xmx8G -XX:MaxMetaspaceSize=4G, que autoriza o daemon a pedir 12 GiB: mais RAM
# do que existe. O resultado nao e erro de build, e a maquina inteira indo pra
# swap — foi o que aconteceu em 23/07 (daemon parado em 5,7 GiB, 118 MiB livres).
# 3G de heap builda este app com folga; o teto agora cabe na maquina.
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
# Um daemon so, e ele morre depois de 30 min ocioso em vez de ficar segurando
# gigabytes ate o proximo build.
org.gradle.daemon.idletimeout=1800000
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
