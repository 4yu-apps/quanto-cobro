name: quantocobro
description: "Quanto Cobro? - calculadora do freelancer BR (valor-hora, reserva de imposto, lucro real)."
publish_to: 'none'

# versionName+versionCode. Nome de EXIBIÇÃO fica em lib/core/config/app_config.dart.
version: 0.8.0+15

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  # TalkBack/menus do sistema em pt-BR (sem isso o Flutter anuncia "Back",
  # "Show menu", "Paste" em inglês — auditoria a11y P0-1).
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado + navegação (padrão da casa)
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0

  # Formatação de moeda/i18n (0.20.2 = a versão que o flutter_localizations pina)
  intl: ^0.20.2

  # Settings locais
  shared_preferences: ^2.5.5

  # Câmbio offline-first (Fase 3): pure-Dart, sem plugin nativo — só a chamada
  # HTTP pra API pública de cotação, sob ação explícita do usuário.
  http: ^1.2.0

  # Dados local-first (SQLite) — camada de dados nas próximas etapas
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1

  # Proposta em PDF (07 §A): pure-Dart, gera os bytes NO APARELHO — nenhum
  # servidor, nenhum link hospedado. É o que mantém o fosso "100% offline, sem
  # cadastro" de pé mesmo com a feature mais "de nuvem" do app. Sem `printing`
  # de propósito: ele arrasta plugin nativo e diálogo de impressora que não
  # queremos — o share nativo do share_plus já entrega o PDF no WhatsApp.
  pdf: ^3.11.3

  # Features (declaradas na fundação 06; ligadas nas próximas etapas)
  share_plus: ^13.2.0
  url_launcher: ^6.3.2
  file_picker: ^8.1.4 # 8.x = gradle moderno (compatível AGP 9); 3.x quebra o build

  # Telemetria — o destino real da camada core/telemetry/. Crash (Crashlytics)
  # e eventos (Analytics), opt-in de verdade (LGPD, desligado por padrão). Só
  # entram agora porque o google-services.json existe (android/app/) — sem ele o
  # firebase_core não sobe e o app morre no boot.
  firebase_core: ^3.8.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.2.0

  # Play Billing — a assinatura Pro (pro_mensal, plano mensal). Antes disso o
  # entitlement era um bool local (dava pra virar Pro sem pagar); agora o Pro
  # só nasce de uma compra confirmada pela loja.
  in_app_purchase: ^3.2.0

# win32 é dep transitiva SÓ do Windows (share_plus quer ^6, file_picker quer ^5).
# O app é Android/iOS — win32 nunca é compilado. Fixo num 5.x pra os dois
# resolverem sem tocar no build mobile.
dependency_overrides:
  win32: ^5.14.0

  # REMOVIDO até a configuração real (aprendido com crash em produção):
  # - google_mobile_ads: o MobileAdsInitProvider DERRUBA o app no boot se o
  #   APPLICATION_ID do AdMob não estiver no AndroidManifest. Recolocar JUNTO
  #   com o meta-data com.google.android.gms.ads.APPLICATION_ID.
  #   (firebase_core/analytics/crashlytics já entraram — ver dependencies.)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # drift_dev + build_runner (code-gen do schema) entram na etapa da camada de
  # dados, com versões alinhadas ao riverpod. Fora daqui pra o esqueleto resolver.

flutter:
  uses-material-design: true

  # Fontes do Design System — empacotadas (offline, sem download em runtime).
  # Sora = números (o herói); Inter = UI/corpo. Licenças OFL em assets/fonts.
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
